<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{background:#f3f4f6;font-family:'Segoe UI',sans-serif;margin:0}
    .wrap{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
    .card{background:#fff;width:100%;max-width:420px;padding:35px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.1)}
    h2{text-align:center;margin:0 0 8px;color:#14532d}
    .hint{background:#fff5f5;border:1px solid #fecaca;border-left:6px solid #dc2626;padding:12px 14px;border-radius:12px;margin-bottom:14px;font-weight:600;color:#b91c1c}
    label{font-weight:600;font-size:14px;color:#374151;display:block;margin:14px 0 6px}
    input{width:100%;padding:11px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:14px}
    .btn{width:100%;background:#16a34a;border:none;color:#fff;padding:12px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;margin-top:16px}
    .btn:hover{background:#15803d}
    .back{text-align:center;margin-top:14px}
    .back a{color:#16a34a;font-weight:800;text-decoration:none}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h2>Admin Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="hint">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <label>Email or Username</label>
      <input type="text" name="email" required>

      <label>Password</label>
      <input type="password" name="password" required>

      <button class="btn" type="submit">Login</button>
    </form>

    <div class="back">
      <a href="{{ url_for('login') }}">← Back to Home</a>
    </div>
  </div>
</div>
</body>
</html>
